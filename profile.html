<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - VIT Parcel</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="navbar-container"></div>
    <main style="max-width: 600px; margin: 0 auto; width: 100%;">
        <div class="card" style="text-align: center; padding: 3rem 1.5rem;">
            <div style="width: 80px; height: 80px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem auto; font-weight: bold;"
                id="profileInitials">
                ??
            </div>
            <h2 id="profileName" style="margin-bottom: 5px;">Student Name</h2>
            <p id="profileRegNo" style="color: var(--text-muted); margin-top: 0; margin-bottom: 20px;">24BCE2498</p>

            <div
                style="background: var(--bg-color); border-radius: var(--radius-sm); padding: 1.5rem; text-align: left; margin-bottom: 2rem;">
                <div class="flex-between"
                    style="border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px;">
                    <span style="color: var(--text-muted);">Hostel Block</span>
                    <strong id="profileBlock" style="text-transform: capitalize;">--</strong>
                </div>
                <div class="flex-between">
                    <span style="color: var(--text-muted);">Phone Number</span>
                    <strong id="profilePhone">--</strong>
                </div>
            </div>

            <a href="edit-profile.html" class="btn btn-outline"
                style="margin-bottom: 10px; display: block; width: 100%;">Edit Profile</a>
            <button class="btn btn-outline"
                style="border-color: var(--danger); color: var(--danger); display: block; width: 100%;"
                onclick="logout()">Log Out</button>
        </div>
    </main>
    <div id="footer-container"></div>

    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            requireAuth();
            const user = getCurrentUser();

            document.getElementById('profileInitials').textContent = user.name.substring(0, 2).toUpperCase();
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileRegNo').textContent = user.username;
            document.getElementById('profileBlock').textContent = user.block.replace('-', ' ');
            document.getElementById('profilePhone').textContent = user.phone;
        });
    </script>
</body>

</html>
