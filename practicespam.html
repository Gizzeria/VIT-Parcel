<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - VIT Parcel</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="navbar-container"></div>
    <main style="max-width: 600px; margin: 0 auto; width: 100%;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 10px;">Contact Us</h2>
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Have a suggestion or found a
                bug? Let us know!</p>

            <form id="contactForm">
                <div class="form-group">
                    <label for="cname">Name</label>
                    <input type="text" id="cname" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Send Message</button>
            </form>
        </div>
    </main>
    <div id="footer-container"></div>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('contactForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Thank you for reaching out! Your message has been sent.');
                form.reset();
            });
        });
    </script>
</body>

</html>
